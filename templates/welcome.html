<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏充值网站 - 欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 80px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 42px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .description {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .info-box {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-top: 40px;
            border-left: 4px solid #667eea;
        }

        .info-box h3 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 5px 0;
        }

        .info-box code {
            background: #e8ecff;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #764ba2;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #888;
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e8ecff;
            padding: 6px 12px;
            border-radius: 20px;
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 32px;
            }

            .button-group {
                flex-direction: column;
            }

            .footer {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-icon">🎮</div>
        <h1>游戏充值网站</h1>
        <p class="subtitle">快速、安全、便捷的游戏充值服务</p>
        <p class="description">专业的游戏资讯和商品管理平台</p>

        <div class="button-group">
            <a href="http://localhost:5176" class="btn btn-primary" target="_blank">
                <span>⭐</span>
                <span>进入前台</span>
            </a>
            <a href="/admin/" class="btn btn-secondary">
                <span>🔧</span>
                <span>后台管理</span>
            </a>
        </div>

        <div class="info-box">
            <h3>📌 快速访问</h3>
            <p><strong>前台网站：</strong> <code>http://localhost:5176</code></p>
            <p><strong>后台管理：</strong> <code>http://127.0.0.1:8000/admin/</code></p>
            <p><strong>API接口：</strong> <code>http://127.0.0.1:8000/api/</code></p>
            <hr style="margin: 15px 0; border: 0; border-top: 1px dashed #ddd;">
            <p>
                <button onclick="fixAdmin()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                    🚨 修复后台显示异常
                </button>
                <span style="font-size: 12px; color: #888; margin-left: 5px;">(清除 SimpleUI 缓存)</span>
            </p>
        </div>

        <div class="footer">
            <div class="version-badge">
                <span>📦</span>
                <span>版本: 1.0.0</span>
            </div>
            <div class="version-badge">
                <span>🏃</span>
                <span>运行中</span>
            </div>
            <div class="version-badge">
                <span>🚀</span>
                <span>Django 5.1.5</span>
            </div>
            <div class="version-badge">
                <span>😊</span>
                <span>Simple UI</span>
            </div>
        </div>
    </div>

    <script>
        function fixAdmin() {
            if (!confirm('确定要清除所有缓存并重新加载后台吗？')) return;
            try {
                localStorage.clear();
                sessionStorage.clear();
                alert('缓存已清除！正在跳转回后台...');
                window.location.href = '/admin/?t=' + new Date().getTime();
            } catch (e) {
                alert('清除失败: ' + e.message);
            }
        }

        // 检查前端服务是否运行
        fetch('http://localhost:5176')
            .then(() => {
                console.log('✅ 前端服务运行正常');
            })
            .catch(() => {
                console.warn('⚠️ 前端服务未启动，请运行: cd frontend && npm run dev');
                // 显示提示信息
                const infoBox = document.querySelector('.info-box');
                const warning = document.createElement('p');
                warning.style.color = '#f59e0b';
                warning.style.marginTop = '10px';
                warning.innerHTML = '<strong>⚠️ 提示：</strong>前端服务未启动，请先运行: <code>cd frontend && npm run dev</code>';
                infoBox.appendChild(warning);
            });
    </script>
</body>
</html>
