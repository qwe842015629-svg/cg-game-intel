    <script>
      // Defer analytics bootstrap to idle/user interaction to avoid blocking first paint.
      (function () {
        const GA_ID = 'G-C6198LC1GN';
        let initialized = false;
        const interactionEvents = ['pointerdown', 'keydown', 'touchstart', 'scroll'];

        const cleanup = () => {
          interactionEvents.forEach((eventName) => {
            window.removeEventListener(eventName, bootstrap, { passive: true });
          });
        };

        const bootstrap = () => {
          if (initialized) return;
          initialized = true;
          cleanup();

          window.dataLayer = window.dataLayer || [];
          window.gtag = function () {
            window.dataLayer.push(arguments);
          };
          window.gtag('js', new Date());
          window.gtag('config', GA_ID, { send_page_view: false });

          const script = document.createElement('script');
          script.async = true;
          script.src = `https://www.googletagmanager.com/gtag/js?id=${GA_ID}`;
          document.head.appendChild(script);
        };

        interactionEvents.forEach((eventName) => {
          window.addEventListener(eventName, bootstrap, { passive: true, once: true });
        });

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(bootstrap, { timeout: 5000 });
        } else {
          window.setTimeout(bootstrap, 5000);
        }
      })();
    </script>
